apiVersion: apps/v1
kind: Deployment

metadata:
  name: churn-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: churn-app

  template:
    metadata:
      labels:
        app: churn-app

    spec:
      containers:
      - name: churn-app
        image: prashantkumar07/churn-app:latest

        ports:
        - containerPort: 8501

        envFrom:
        - configMapRef:
            name: churn-config

        - secretRef:
            name: churn-secret